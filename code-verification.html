<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Verification - Futsala Club</title>
    <link rel="stylesheet" href="code-verification.css">
</head>
<body>
    <div class="login-container">
        <div class="login-content">
            <h1>FUTSALA</h1>
            <h2>Enter code</h2>
            <p>Sent to <span id="user-email"></span></p>
            <form id="code-form">
                <input type="text" id="code" name="code" placeholder="Enter code" required>
                <button type="submit" class="continue-button">Submit</button>
            </form>
            <p><a href="login.html">Log in with a different email</a></p>
        </div>
    </div>

    <!-- Link to the code verification JavaScript file -->
    <script src="code-verification.js"></script>
</body>
</html>
