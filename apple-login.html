<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Login - Futsala Club</title>
    <link rel="stylesheet" href="apple-login.css"> <!-- Link to the CSS file -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"> <!-- Font Awesome for icons -->
</head>
<body>
    <!-- Apple Login Section -->
    <div class="login-container">
        <div class="login-content">
            <h1>FUTSALACLUB</h1>
            <p>Use your Apple Account to sign in to FutsalaClub.</p>

            <!-- Apple Login Form -->
            <form id="apple-login-form">
                <div class="form-group">
                    <label for="apple-email">Email or Phone Number *</label>
                    <input type="email" id="apple-email" name="apple-email" placeholder="Enter your email or phone number" required>
                </div>
                <button type="submit" class="continue-button">Continue with Apple</button>
            </form>

            <!-- Back to Login Link -->
            <p><a href="login.html">Go back to login options</a></p>
        </div>
    </div>

    <!-- Link to your JavaScript file (if needed) -->
    <script src="apple-login.js"></script>
</body>
</html>
